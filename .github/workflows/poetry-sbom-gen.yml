name: Poetry SPDX Dependency Submission

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  POETRY_DIR: backend

jobs:
  dependency-submission:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          pip install poetry
          poetry self add poetry-plugin-export

      - name: Verify Poetry project
        working-directory: ${{ env.POETRY_DIR }}
        run: |
          ls -la
          poetry --version
          poetry check      

      - name: Submit component detection dependency snapshot
        uses: advanced-security/component-detection-dependency-submission-action@main
        with:
          detectorArgs: Poetry=EnableIfDefaultOff
          correlator: "chk"
