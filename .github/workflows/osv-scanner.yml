name: OSV Scanner

on:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan:
    name: OSV Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OSV Scanner
        uses: google/osv-scanner-action/install@v1

      - name: Run OSV Scanner
        run: |
          osv-scanner scan source \
            -r . \
            --format json \
            --output osv-results.json

      - name: Install osv-reporter
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-reporter@latest

      - name: Convert OSV results to SARIF
        run: |
          osv-reporter \
            --new osv-results.json \
            --output sarif:osv-results.sarif

      - name: Upload OSV SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
